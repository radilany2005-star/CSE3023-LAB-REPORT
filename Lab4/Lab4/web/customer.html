<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Discount</title>
    <link rel="stylesheet" href="style.css"> <!-- your CSS file -->
</head>
<body>

<div class="container">
    <h1>Use JSP Scriptlet and JSP Expression in Application</h1>

    <div class="card">
        <h2 class="form-title">Customer Discount</h2>

        <form action="processCustomer.jsp" method="post">

            <!-- Customer Code -->
            <div class="form-group">
                <label for="code">Customer Code</label>
                <input type="text" id="code" name="customerCode" placeholder="Key in customer code" required>
            </div>

            <!-- Quantity -->
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" placeholder="Key in quantity" required>
            </div>

            <!-- Customer Type -->
            <div class="form-group">
                <label>Customer Type</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="customerType" value="1" required>
                        Normal Customer
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="customerType" value="2">
                        Privilege Customer
                        </label>
                   
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn btn-submit">Submit</button>
                <button type="reset" class="btn btn-cancel">Cancel</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
